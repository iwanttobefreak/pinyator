{% extends "base.html" %}
{% block extra_head %}
<style>
table { width: 100%; border-collapse: collapse; }
th, td { padding: 0.5rem 0.7rem; text-align: left; border-bottom: 1px solid #e0e0e0; }
th { background: #f5f5f5; font-size: 0.8rem; font-weight: 600; }
td { font-size: 0.82rem; }
.badge { display:inline-block; padding:0.15rem 0.4rem; border-radius:3px; font-size:0.7rem; font-weight:600; }
.badge-admin { background:#c62828; color:white; }
.badge-cap { background:#1565c0; color:white; }
.badge-casteller { background:#e0e0e0; color:#555; }
.form-inline-create { display: flex; gap: 0.5rem; align-items: end; flex-wrap: wrap; margin-bottom: 1rem; background: #f8f9fa; padding: 1rem; border-radius: 6px; }
.form-inline-create .form-group { margin: 0; }
.form-inline-create .form-group label { font-size: 0.75rem; }
.form-inline-create .form-group input { width: auto; }
.form-inline-create .btn { width: auto; }

@media (max-width: 768px) {
    table { display: block; overflow-x: auto; white-space: nowrap; }
    .form-inline-create form { flex-direction: column; width: 100%; }
    .form-inline-create .form-group { width: 100%; }
    .form-inline-create .form-group input { width: 100%; }
    td, th { padding: 0.4rem 0.5rem; font-size: 0.75rem; }
}
</style>
{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Usuaris Castellers</h1>
    <div>
        <a href="{{ url_for('templates_admin.config') }}" class="btn" style="background:#ccc;width:auto;">Tornar a configuració</a>
    </div>
</div>

<div class="form-inline-create">
    <form method="POST" action="{{ url_for('templates_admin.config_add_user') }}" style="display:flex;gap:0.5rem;align-items:end;flex-wrap:wrap;width:100%;">
        <div class="form-group">
            <label>Nom</label>
            <input type="text" name="name" placeholder="Nom complet" required>
        </div>
        <div class="form-group">
            <label>Usuari (opcional)</label>
            <input type="text" name="username" placeholder="Es genera automàticament">
        </div>
        <div class="form-group">
            <label>Contrasenya (opcional)</label>
            <input type="text" name="password" placeholder="Es genera automàticament">
        </div>
        <button type="submit" class="btn btn-primary">Crear usuari</button>
    </form>
</div>

<div style="margin-bottom:1rem;">
    <form method="POST" action="{{ url_for('templates_admin.config_import_users') }}"
          onsubmit="return confirm('Això esborrarà TOTS els castellers actuals i els substituirà pels del fitxer. Segur?')"
          style="display:inline;">
        <button type="submit" class="btn btn-primary" style="width:auto;">Importar de /tmp/usuaris.txt</button>
    </form>
</div>

<table>
    <thead>
        <tr><th>Malnom</th><th>Usuari</th><th>Rol</th><th>Altura</th><th></th></tr>
    </thead>
    <tbody>
        {% for u in users %}
        <tr>
            <td><strong>{{ u.name }}</strong></td>
            <td><code>{{ u.username }}</code></td>
            <td><span class="badge badge-{{ u.role }}">{{ u.role }}</span></td>
            <td>{{ u.height or '—' }} cm</td>
            <td>
                <form method="POST" action="{{ url_for('templates_admin.config_reset_password', uid=u.id) }}"
                      style="display:inline;"
                      onsubmit="var p = prompt('Nova contrasenya per a {{ u.username }} (deixa buit per usar el nom d\\'usuari):'); if(p !== null){this.password.value=p; return true;} return false;">
                    <input type="hidden" name="password" value="">
                    <button type="submit" class="btn" style="width:auto;padding:0.2rem 0.5rem;font-size:0.75rem;background:#e0e0e0;">Inicialitzar contrasenya</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
